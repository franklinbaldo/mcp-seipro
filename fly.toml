# fly.toml — todos MCP Server
# Deploy: flyctl launch --no-deploy && flyctl deploy
# Docs: https://fly.io/docs/reference/configuration/

app = "todos-mcp"        # change: must be globally unique on fly.io
primary_region = "gru"   # São Paulo — closest region for governo.br

[build]

[env]
  PORT = "8000"

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

  [[http_service.checks]]
    grace_period = "10s"
    interval = "30s"
    method = "GET"
    path = "/"
    timeout = "5s"
