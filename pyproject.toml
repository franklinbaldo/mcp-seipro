[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "todos-sei"
version = "0.4.0"
description = "TOdos Domina O Sei — MCP server para o SEI com paridade web-first: 116 tools, scraper HTTP + REST híbrido, funciona em instâncias sem mod-wssei"
readme = "README.md"
license = "MIT"
requires-python = ">=3.11"
keywords = ["mcp", "sei", "governo", "documentos", "claude"]
dependencies = [
    "mcp[cli]>=1.12",
    "httpx>=0.27",
    "beautifulsoup4>=4",
    "markdownify>=0.14",
    "pdfplumber>=0.10",
    "pdf2image>=1.16",
    "pytesseract>=0.3",
    "uvicorn[standard]>=0.30",
]

[project.scripts]
todos = "todos.server:main"

[tool.hatch.build.targets.wheel]
packages = ["src/todos"]

[tool.hatch.build.targets.sdist]
include = ["src/todos/", "pyproject.toml", "README.md"]
